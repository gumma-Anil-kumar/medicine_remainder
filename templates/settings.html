{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4><i class="fas fa-cog"></i> Notification Settings</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email Notifications</label>
                        
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" 
                                   name="email_notif" id="email_notif" 
                                   {% if preferences.email %}checked{% endif %}>
                            <label class="form-check-label" for="email_notif">
                                <i class="fas fa-envelope text-primary"></i> Receive Email Reminders
                            </label>
                            <small class="d-block text-muted">We'll send medicine reminders to your email</small>
                        </div>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle"></i>
                        <strong>Note:</strong> You'll receive emails with a button to confirm when you've taken your medicine.
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Settings
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
